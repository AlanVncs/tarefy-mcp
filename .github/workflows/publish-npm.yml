name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write   # Obrigatório para OIDC (Trusted Publishing)
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish to npm (Trusted Publishing / OIDC)
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm publish --access public
        # Sem NODE_AUTH_TOKEN: autenticação via OIDC (Trusted Publishing).
        # Dispara apenas em push de tags v* (ex.: v0.1.2) ou manualmente (workflow_dispatch).

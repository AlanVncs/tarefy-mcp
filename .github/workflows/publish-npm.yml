# Publica no npm em push de tags v* (e via workflow_dispatch).
# Usa Trusted Publisher (OIDC) — https://docs.npmjs.com/trusted-publishers
# No npmjs.com configure Trusted Publisher para o pacote @alanvncs/tarefy-mcp.
name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Test
        run: bun test

      - name: Publish @alanvncs/tarefy-mcp
        run: npm publish --access public
